<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- Form -->
        <form class="form-card">
            <h2>Add User</h2>

            <input type="text" id="name" placeholder="Name" required>
            <input type="text" id="role" placeholder="Role" required>
            <textarea id="bio" placeholder="Bio" required></textarea>
            <input type="text" id="photo" placeholder="Photo URL" required>

            <button type="submit">Submit</button>
        </form>

        <!-- Cards -->
        <div class="cards">

            <div class="card">
                <img src="https://i.pravatar.cc/100?img=1">
                <h3>John Doe</h3>
                <h4>Frontend Developer</h4>
                <p>Loves building beautiful UIs and learning new technologies.</p>
            </div>

            <div class="card">
                <img src="https://i.pravatar.cc/100?img=2">
                <h3>Jane Smith</h3>
                <h4>Backend Engineer</h4>
                <p>Enjoys solving complex problems and optimizing APIs.</p>
            </div>

            <div class="card">
                <img src="https://i.pravatar.cc/100?img=3">
                <h3>Alex Lee</h3>
                <h4>UI/UX Designer</h4>
                <p>Passionate about user experience and clean design.</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
